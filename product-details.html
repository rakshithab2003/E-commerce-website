<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f5f5;
    }

    .product-card {
      max-width: 420px;
      margin: 30px auto;
      border-radius: 10px;
    }

    .product-img {
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      margin: 0 auto 15px;
    }

    .star {
      font-size: 22px;
      cursor: pointer;
      color: #ccc;
    }

    .star.selected {
      color: gold;
    }
  </style>
</head>

<body>

<div id="productBox"></div>

<script>
const product = JSON.parse(localStorage.getItem("selectedProduct"));
let selectedRating = 0;

document.getElementById("productBox").innerHTML = `
  <div class="card product-card p-4">

    <!-- PRODUCT IMAGE -->
     <img src="${product.image ? 'http://localhost:5000'+product.image:
              'https://via.placeholder.com/220'}"
                 class="product-img"
                 style="height:180px;object-fit:cover">

    <!-- PRODUCT INFO -->
    <h4 class="mb-1">${product.productName}</h4>
    <h5 class="text-success mb-2">₹${product.price}</h5>
    <p class="text-muted small">${product.description}</p>

    <!-- SELLER INFO -->
    <div class="d-flex align-items-center gap-2 mb-3">
      <img 
        src="${product.sellerImage 
          ? 'http://localhost:5000' + product.sellerImage 
          : 'https://via.placeholder.com/40'}"
        class="rounded-circle"
        style="width:40px;height:40px;object-fit:cover;"
        onerror="this.src='https://via.placeholder.com/40'">

      <div>
        <b class="small">${product.sellerName}</b><br>
        <small class="text-muted">${product.email}</small>
      </div>
    </div>

    <hr>

    <!-- RATING -->
    <div class="mb-2">
      <span class="star" onclick="setRating(1)">★</span>
      <span class="star" onclick="setRating(2)">★</span>
      <span class="star" onclick="setRating(3)">★</span>
      <span class="star" onclick="setRating(4)">★</span>
      <span class="star" onclick="setRating(5)">★</span>
    </div>

    <!-- COMMENT -->
    <textarea id="comment" class="form-control form-control-sm mb-2"
      rows="2" placeholder="Write a comment..."></textarea>

    <button class="btn btn-secondary btn-sm w-100 mb-3"
      onclick="submitReview()">Submit</button>

    <!-- ACTION BUTTONS -->
    <div class="d-flex gap-2">
      <button class="btn btn-outline-primary btn-sm w-50"
        onclick="addToCart()">Add to Cart</button>

      <button class="btn btn-success btn-sm w-50"
        onclick="goToPayment()">Buy Now</button>
    </div>

  </div>
`;

// ⭐ Rating logic
function setRating(rating) {
  selectedRating = rating;
  document.querySelectorAll(".star").forEach((star, index) => {
    star.classList.toggle("selected", index < rating);
  });
}

// 📝 Review submit
function submitReview() {
  const comment = document.getElementById("comment").value;
  if (!selectedRating) {
    alert("Please select a rating ⭐");
    return;
  }
  alert(`Rating: ${selectedRating} ⭐\nComment: ${comment}`);
}

// 🛒 Cart
function addToCart() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart 🛒");
}

// 💳 Payment
function goToPayment() {
  window.location.href = "payment.html";
}
</script>

</body>
</html>
