<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
    <h4 class="text-center mb-4">Add Product</h4>

    <form id="productForm" enctype="multipart/form-data">

      <!-- Seller details -->
      <input class="form-control mb-2" name="sellerName" placeholder="Seller Name" required>
      <input class="form-control mb-2" name="email" type="email" placeholder="Email" required>
      <input class="form-control mb-3" name="phoneNumber" placeholder="Phone" required>

      <!-- Seller profile pic -->
      <div class="text-center mb-3">
        <label class="fw-bold">Add Seller Profile Pic (optional)</label><br>

        <img
          id="sellerPreview"
          src="images/default-avatar.png"
          style="
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid #ccc;
          "
        >

        <input
          type="file"
          name="sellerImage"
          class="form-control mt-2"
          accept="image/*"
          onchange="previewSellerImage(event)"
        >
      </div>

      <!-- Product info -->
      <input class="form-control mb-2" name="productName" placeholder="Product Name" required>

      <select class="form-control mb-2" name="category" required>
        <option value="">Select Category</option>
        <option value="pottery">Pottery Products</option>
        <option value="jewellery"> Handcrafted Jewellery</option>
        <option value="home-decor">Home Decor Products</option>
        <option value="furniture">Crafted Furniture Products</option>
        <option value="food-products">Artisanal Food Products</option>
        <option value="cloth">Handmade Clothing Products</option>
      </select>

      <input class="form-control mb-2" name="price" type="number" placeholder="Price" required>

      <!-- Product image -->
      <label class="fw-bold">Upload Product Image</label>

      <img
        id="productPreview"
        src=""
        style="
          width:100%;
          height:200px;
          object-fit:cover;
          border-radius:10px;
          display:none;
          margin-bottom:10px;
        "
      >

      <input
        type="file"
        name="image"
        class="form-control mb-3"
        accept="image/*"
        required
        onchange="previewProductImage(event)"
      >

      <textarea
        class="form-control mb-3"
        name="description"
        placeholder="Product Description"
        required
      ></textarea>

      <button class="btn btn-primary w-100">Add Product</button>
    </form>
  </div>
</div>
<script>
document.getElementById("productForm").addEventListener("submit", async function(e) {
  e.preventDefault(); // STOP page reload

  const formData = new FormData(this);

  try {
    const res = await fetch("http://localhost:5000/add-product", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (res.ok) {
      alert("✅ Product added successfully!");
      this.reset();

      // reset images
      document.getElementById("sellerPreview").src = "images/default-avatar.png";
      document.getElementById("productPreview").style.display = "none";
    } else {
      alert("❌ Failed: " + data.error);
    }

  } catch (err) {
    alert("❌ Server not responding");
    console.error(err);
  }
});
</script>


</body>
</html>
