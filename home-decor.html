<!DOCTYPE html>
<html>
<head>
  <title>Home Decor Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">
  <h3 class="mb-3">Home Decor Products</h3>
  <div class="row" id="products"></div>
</div>
<script>
const category = "home-decor"; // change for jewellery, food-products etc
let allProducts = [];

const sellerEmail = localStorage.getItem("sellerEmail");

fetch(`http://localhost:5000/products/${category}`)
  .then(res => res.json())
  .then(data => {
    allProducts = data;
    const box = document.getElementById("products");

    if (data.length === 0) {
      box.innerHTML = "<p>No products available</p>";
      return;
    }

   data.forEach(p => {
  box.innerHTML += `
    <div class="col-md-3 mb-3">
      <div class="card p-2 position-relative shadow-sm rounded-4">

        ${sellerEmail === p.email ? `
          <button class="btn btn-danger btn-sm position-absolute top-0 start-0"
            onclick="deleteProduct('${p._id}', this)">
            🗑
          </button>
        ` : ""}

        <!-- Wishlist button -->
        <button class="btn btn-sm position-absolute top-0 end-0"
            onclick="addToWishlist('${p._id}')">
          ❤️
        </button>

        <img src="${p.image ? 'http://localhost:5000'+p.image:
          'https://via.placeholder.com/300'}"
             class="img-fluid"
             style="height:260px;width:100%;object-fit:cover">

        <h6 class="mt-2">${p.productName}</h6>
        <p class="text-success fw-bold">₹${p.price}</p>

        <button class="btn btn-primary btn-sm w-100"
          onclick="buyNow('${p._id}')">
          SHOP NOW
        </button>
      </div>
    </div>
  `;
});
});   

// 🗑 Delete product
function deleteProduct(id, btn) {
  if (!confirm("Delete this product?")) return;

  fetch(`http://localhost:5000/products/${id}`, {
    method: "DELETE"
  })
  .then(res => res.json())
  .then(() => {
    btn.closest(".col-md-3").remove();
    alert("Product deleted ✅");
  });
}

// ❤️ Wishlist
function addToWishlist(id){
  const product = allProducts.find(p => p._id === id);
  const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
  wishlist.push(product);
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
  alert("Added to Wishlist ❤️");
}

// 🛒 Buy now
function buyNow(id){
  const product = allProducts.find(p => p._id === id);
  localStorage.setItem("selectedProduct", JSON.stringify(product));
  window.location.href = "http://127.0.0.1:5500/Frontend/product-details.html";
}
</script>

</body>
</html>
