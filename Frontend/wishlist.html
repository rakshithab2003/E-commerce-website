<!DOCTYPE html>
<html>
<head>
  <title>Wishlist</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">
  <h3 class="mb-3">❤️ My Wishlist</h3>
  <div class="row" id="wishlistContainer"></div>
</div>

<script>
const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
const container = document.getElementById("wishlistContainer");

if (wishlist.length === 0) {
  container.innerHTML = "<p>No items in wishlist</p>";
}

wishlist.forEach(item => {
  container.innerHTML += `
    <div class="col-md-3 mb-3">
      <div class="card p-2 h-100 rounded-4 shadow-sm">
        <img 
          src="${item.image ? 'http://localhost:5000' + item.image :
          'https://via.placeholder.com/300'}"
          class="card-img-top"
          style="height:260px;width:100%;object-fit:cover">

        <h6 class="mt-2">${item.productName}</h6>
        <p class="text-success fw-bold">₹${item.price}</p>

        <button class="btn btn-warning btn-sm w-100"
          onclick="buyNow('${item._id}')">
          Buy Now
        </button>
      </div>
    </div>
  `;
});

function buyNow(id) {
  const product = wishlist.find(p => p._id === id);
  localStorage.setItem("selectedProduct", JSON.stringify(product));
  window.location.href = "payment.html";
}
</script>
</body>
</html>
