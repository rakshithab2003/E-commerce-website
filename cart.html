<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">
  <h3 class="mb-3">🛒 My Cart</h3>
  <div class="row" id="cartContainer"></div>

  <button class="btn btn-warning mt-3"
    onclick="goToPayment()">
    Buy Now
  </button>
</div>

<script>
const cart = JSON.parse(localStorage.getItem("cart")) || [];
const container = document.getElementById("cartContainer");

if (cart.length === 0) {
  container.innerHTML = "<p>Your cart is empty</p>";
}

cart.forEach(item => {
  container.innerHTML += `
    <div class="col-md-3 mb-3">
      <div class="card p-2 h-100 rounded-4 shadow-sm">
        <img 
          src="${item.image ? 'http://localhost:5000' + item.image :
          'https://via.placeholder.com/300'}"
          class="card-img-top"
          style="height:260px;width:100%;object-fit:cover">


        <h6 class="mt-2">${item.productName}</h6>
        <p class="text-success fw-bold">₹${item.price}</p>
        <button class="btn btn-warning btn-sm w-100"
          onclick="buyNow('${item._id}')">
          Buy Now
        </button>
      </div>
    </div>
  `;
});

function goToPayment() {
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }
  localStorage.setItem("selectedProduct", JSON.stringify(cart[0]));
  window.location.href = "payment.html";
}
</script>
</body>
</html>
